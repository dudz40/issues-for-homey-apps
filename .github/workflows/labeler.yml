name: Auto Labeler

on:
  issues:
    types: [opened]

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Parse dropdown and apply label
        uses: andymckay/labeler@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # This config file holds your translation rules from File 2
          configuration-path: .github/labeler-config.yml
